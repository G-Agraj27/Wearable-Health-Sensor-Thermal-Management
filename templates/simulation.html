{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>Network Simulation</h2>
    <div class="grid-cols-2">
        <div class="controls">
            <h3>Configuration</h3>
            <div class="form-group">
                <label>Number of Nodes:</label>
                <input type="number" id="numNodes" value="30" min="10" max="100">
            </div>
            <div class="form-group">
                <label>Transmission Range (0-1):</label>
                <input type="number" id="txRange" value="0.25" step="0.05" min="0.1" max="0.5">
            </div>
            <button onclick="generateNetwork()">Generate Network</button>
            
            <hr>
            
            <h3>Path Finding</h3>
            <div class="form-group">
                <label>Source Node ID:</label>
                <input type="number" id="sourceNode" placeholder="Select from canvas">
            </div>
            <div class="form-group">
                <label>Target Node ID:</label>
                <input type="number" id="targetNode" placeholder="Select from canvas">
            </div>
            <button onclick="findPath()">Find Optimal Path</button>
        </div>
        
        <div class="stats-card" id="resultsPanel" style="display:none;">
            <h3>Transmission Results</h3>
            <table id="resultsTable">
                <tr>
                    <th>Metric</th>
                    <th>Existing</th>
                    <th>Proposed</th>
                </tr>
                <tr>
                    <td>Power (mW)</td>
                    <td id="ex-power">-</td>
                    <td id="pr-power">-</td>
                </tr>
                <tr>
                    <td>Energy (mJ)</td>
                    <td id="ex-energy">-</td>
                    <td id="pr-energy">-</td>
                </tr>
                <tr>
                    <td>Delay (ms)</td>
                    <td id="ex-delay">-</td>
                    <td id="pr-delay">-</td>
                </tr>
                <tr>
                    <td>Overhead</td>
                    <td id="ex-overhead">-</td>
                    <td id="pr-overhead">-</td>
                </tr>
                <tr>
                    <td>Success Rate (%)</td>
                    <td id="ex-success">-</td>
                    <td id="pr-success">-</td>
                </tr>
            </table>
        </div>
    </div>
</div>

<div class="container">
    <canvas id="networkCanvas" width="1100" height="600"></canvas>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/simulation.js') }}"></script>
{% endblock %}
